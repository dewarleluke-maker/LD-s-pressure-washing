<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pricing Calculator | Gold Standard Pressure Washing</title>
<meta name="description" content="Get an instant price estimate for driveway washing, sealing, and deck cleaning from Gold Standard Pressure Washing." />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  body {
    margin: 0;
    background: #f9f9f8;
    padding: 2rem 1rem;
  }

  .gsp-calc {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1a1a1a;
    width: 100%;
    box-sizing: border-box;
  }

  .gsp-calc * {
    box-sizing: border-box;
  }

  .gsp-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .gsp-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 10px;
    background: #ffffff;
    border: 0.5px solid #e5e5e3;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: #5b5b58;
    text-align: center;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .gsp-tab i {
    font-size: 22px;
    line-height: 1;
    color: #5b5b58;
    transition: color 0.15s ease;
  }

  .gsp-tab:hover:not(.active) {
    border-color: #c8c8c5;
  }

  .gsp-tab.active {
    border: 2px solid #1d9e75;
    background: #ffffff;
    color: #1a1a1a;
  }

  .gsp-tab.active i {
    color: #1d9e75;
  }

  .gsp-panel {
    background: #ffffff;
    border: 0.5px solid #e5e5e3;
    border-radius: 12px;
    padding: 28px;
  }

  .gsp-title {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 6px;
  }

  .gsp-desc {
    font-size: 13px;
    color: #7a7a77;
    margin: 0 0 26px;
  }

  .gsp-slider-row {
    margin-bottom: 26px;
  }

  .gsp-slider-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    color: #1a1a1a;
  }

  .gsp-slider-label span {
    color: #1d9e75;
    font-weight: 600;
  }

  #gsp-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #e5e5e3;
    outline: none;
    margin: 0;
  }

  #gsp-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1d9e75;
    cursor: pointer;
    border: none;
  }

  #gsp-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1d9e75;
    cursor: pointer;
    border: none;
  }

  #gsp-slider::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: #e5e5e3;
  }

  .gsp-price-card {
    background: #f9f9f8;
    border: 0.5px solid #e5e5e3;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .gsp-price-label {
    font-size: 13px;
    color: #7a7a77;
    margin-bottom: 6px;
  }

  .gsp-price-value {
    font-size: 28px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .gsp-price-note {
    font-size: 13px;
    color: #7a7a77;
    margin: 0;
  }

  .gsp-factors {
    margin-bottom: 22px;
  }

  .gsp-factors-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .gsp-tag {
    display: inline-flex;
    align-items: center;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .gsp-tag-green {
    background: rgba(29, 158, 117, 0.1);
    color: #1d9e75;
  }

  .gsp-tag-amber {
    background: rgba(180, 83, 9, 0.1);
    color: #b45309;
  }

  .gsp-breakpoint-note {
    font-size: 12.5px;
    color: #9a9a96;
    margin: 0;
    padding-top: 16px;
    border-top: 0.5px solid #e5e5e3;
  }

  @media (max-width: 600px) {
    .gsp-tabs {
      grid-template-columns: repeat(2, 1fr);
    }

    .gsp-panel {
      padding: 20px;
    }

    .gsp-price-value {
      font-size: 24px;
    }
  }
</style>
</head>
<body>

  <section class="gsp-calc">
    <div class="gsp-tabs" role="tablist" aria-label="Select a service">
      <button type="button" class="gsp-tab active" data-service="driveway" role="tab" aria-selected="true">
        <i class="ti ti-car-garage" aria-hidden="true"></i>
        <span>Driveway + Walkway</span>
      </button>
      <button type="button" class="gsp-tab" data-service="sealing" role="tab" aria-selected="false">
        <i class="ti ti-paint" aria-hidden="true"></i>
        <span>Sealing</span>
      </button>
      <button type="button" class="gsp-tab" data-service="driveway-sealing" role="tab" aria-selected="false">
        <i class="ti ti-droplet" aria-hidden="true"></i>
        <span>Driveway + Sealing</span>
      </button>
      <button type="button" class="gsp-tab" data-service="deck" role="tab" aria-selected="false">
        <i class="ti ti-building" aria-hidden="true"></i>
        <span>Deck Wash</span>
      </button>
    </div>

    <div class="gsp-panel" id="gsp-panel"></div>
  </section>

  <script>
    const SERVICES = {
      driveway: {
        title: "Driveway + Walkway Wash",
        description: "Pressure washing for driveways, walkways, sidewalks, and other concrete surfaces.",
        min: 0,
        max: 1200,
        default: 300,
        breakpoint: 600,
        breakpointNote: "Flat $150 min for 0–600 sq ft. Add $25 per 100 sq ft over 600.",
        greenTags: ["Surface material", "Last cleaned"],
        amberTags: ["Oil / grease stains", "Heavy mold or mildew", "Tight access"],
        calc(sqft) {
          if (sqft <= 600) {
            return { low: 150, high: 185 };
          }
          const steps = Math.ceil((sqft - 600) / 100);
          const low = 150 + steps * 25;
          const high = Math.round(low * 1.25);
          return { low, high };
        },
      },
      sealing: {
        title: "Sealing",
        description: "Protective sealant applied to clean concrete to guard against stains and weather.",
        min: 0,
        max: 1200,
        default: 300,
        breakpoint: 400,
        breakpointNote: "Flat $200 for 0–400 sq ft. Add $30 per 100 sq ft over 400.",
        greenTags: ["Previously sealed", "Number of coats"],
        amberTags: ["Oil spots present", "Weather window", "Surface porosity"],
        calc(sqft) {
          let low = 200;
          if (sqft > 400) {
            const steps = Math.ceil((sqft - 400) / 100);
            low = 200 + steps * 30;
          }
          const high = Math.round(low * 1.22);
          return { low, high };
        },
      },
      "driveway-sealing": {
        title: "Driveway + Sealing",
        description: "Full driveway wash followed by a protective seal coat for long-lasting results.",
        min: 0,
        max: 1200,
        default: 400,
        breakpoint: 600,
        breakpointNote: "Flat $325 for 0–600 sq ft. Add $45 per 100 sq ft over 600.",
        greenTags: ["Driveway material", "Coat count needed"],
        amberTags: ["Oil or grease stains", "Same-day weather", "Surface condition"],
        calc(sqft) {
          let low = 325;
          if (sqft > 600) {
            const steps = Math.ceil((sqft - 600) / 100);
            low = 325 + steps * 45;
          }
          const high = Math.round(low * 1.22);
          return { low, high };
        },
      },
      deck: {
        title: "Deck Wash",
        description: "Pressure washing for wood, composite, and vinyl decks, railings, and surrounding structures.",
        min: 0,
        max: 1000,
        default: 300,
        breakpoint: 400,
        breakpointNote: "Flat $200 for any deck up to 400 sq ft. Add $0.40/sq ft over 400.",
        greenTags: ["Wood vs. composite", "Railing spindles", "Pre-stain prep needed"],
        amberTags: ["Mold / mildew buildup", "Multi-level deck"],
        calc(sqft) {
          let low = sqft <= 400 ? 200 : 200 + 0.4 * (sqft - 400);
          low = Math.round(low);
          const high = Math.round(low * 1.25);
          return { low, high };
        },
      },
    };

    let currentService = "driveway";
    const panel = document.getElementById("gsp-panel");

    function renderPanel() {
      const svc = SERVICES[currentService];
      panel.innerHTML = `
        <h2 class="gsp-title">${svc.title}</h2>
        <p class="gsp-desc">${svc.description}</p>
        <div class="gsp-slider-row">
          <label for="gsp-slider" class="gsp-slider-label">Approximate size: <span id="gsp-sqft-value">${svc.default}</span> sq ft</label>
          <input type="range" id="gsp-slider" min="${svc.min}" max="${svc.max}" step="10" value="${svc.default}" />
        </div>
        <div class="gsp-price-card">
          <div class="gsp-price-label">Quoted price range</div>
          <div class="gsp-price-value" id="gsp-price-value"></div>
          <p class="gsp-price-note" id="gsp-price-note"></p>
        </div>
        <div class="gsp-factors">
          <div class="gsp-factors-group">
            ${svc.greenTags.map((t) => `<span class="gsp-tag gsp-tag-green">${t}</span>`).join("")}
            ${svc.amberTags.map((t) => `<span class="gsp-tag gsp-tag-amber">${t}</span>`).join("")}
          </div>
        </div>
        <p class="gsp-breakpoint-note">${svc.breakpointNote}</p>
      `;
      document.getElementById("gsp-slider").addEventListener("input", updatePrice);
      updatePrice();
    }

    function updatePrice() {
      const svc = SERVICES[currentService];
      const slider = document.getElementById("gsp-slider");
      const sqft = parseInt(slider.value, 10);
      document.getElementById("gsp-sqft-value").textContent = sqft;
      const { low, high } = svc.calc(sqft);
      document.getElementById("gsp-price-value").textContent = `$${low.toLocaleString()} – $${high.toLocaleString()}`;
      const noteEl = document.getElementById("gsp-price-note");
      if (sqft <= svc.breakpoint) {
        noteEl.textContent = `At or under our ${svc.breakpoint} sq ft flat-rate size — base pricing applies.`;
      } else {
        noteEl.textContent = `Includes additional charge for the ${sqft - svc.breakpoint} sq ft beyond our ${svc.breakpoint} sq ft flat-rate threshold.`;
      }
    }

    document.querySelectorAll(".gsp-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".gsp-tab").forEach((t) => {
          t.classList.remove("active");
          t.setAttribute("aria-selected", "false");
        });
        tab.classList.add("active");
        tab.setAttribute("aria-selected", "true");
        currentService = tab.dataset.service;
        renderPanel();
      });
    });

    renderPanel();
  </script>

</body>
</html>
